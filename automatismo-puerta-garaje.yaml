switch:
  - platform: gpio
    pin: GPIO25
    id: pulsador
    on_turn_on: 
      then:
        - delay: 
            seconds: 0.5
        - switch.turn_off: pulsador

button:
  - platform: template
    name: Accionar
    on_press:
      - switch.turn_on: pulsador

output:
  - platform: ledc
    pin: GPIO32
    id: laser1
    min_power: 0.1
    zero_means_zero: True
  - platform: ledc
    pin: GPIO33
    id: laser2
    min_power: 0.1
    zero_means_zero: True

# Example usage in a light
light:
  - platform: monochromatic
    output: laser1
    name: "Laser 1"
  - platform: monochromatic
    output: laser2
    name: "Laser 2"

